<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedAI Smart Assistant</title>
<link rel="stylesheet" href="ui_style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">🧠 MedAI</div>
    <div class="nav-links">
        <span>Home</span>
        <span>Features</span>
        <span>About</span>
    </div>
</nav>

<section class="hero">
    <h1>Smart Healthcare Assistant</h1>
    <p>Your AI companion for learning, guidance, and simulations.</p>
    <button onclick="toggleChat()">Start Chat</button>
</section>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        MedAI Assistant
        <span onclick="toggleChat()">✖</span>
    </div>
    <div class="chat-body" id="chatBox"></div>
    <div class="chat-input">
        <input id="userInput" placeholder="Type a message...">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script src="ui_script.js"></script>
</body>
</html>
